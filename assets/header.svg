<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;family=Orbitron:wght@700;900&amp;display=swap');
      .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
      .orb  { font-family: 'Orbitron', 'Share Tech Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="#06080a"/>
  <!-- Top hazard strip -->
  <rect x="0" y="0" width="800" height="4" fill="url(#hz)"/>
  <!-- Bottom hazard strip -->
  <rect x="0" y="196" width="800" height="4" fill="url(#hz)"/>

  <defs>
    <pattern id="hz" x="0" y="0" width="20" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="12" height="4" fill="#C8001A"/>
      <rect x="12" y="0" width="8" height="4" fill="#06080a"/>
    </pattern>
  </defs>

  <!-- Monogram box -->
  <rect x="28" y="28" width="64" height="64" fill="none" stroke="#C8001A" stroke-width="1.5"/>
  <!-- Corner accents -->
  <polyline points="28,28 20,28 20,20 28,20" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <polyline points="92,28 100,28 100,20 92,20" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <polyline points="28,92 20,92 20,100 28,100" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <polyline points="92,92 100,92 100,100 92,100" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <text x="60" y="66" text-anchor="middle" dominant-baseline="central" class="orb" font-size="22" font-weight="900" fill="#C8001A">DM</text>

  <!-- Name -->
  <text x="118" y="52" class="orb" font-size="26" font-weight="900" fill="#e8f0f4" letter-spacing="3">DAVID MENDOZA</text>
  <!-- Role -->
  <text x="120" y="74" class="mono" font-size="11" fill="#C8001A" letter-spacing="4">// FULL STACK DEVELOPER</text>

  <!-- Badges -->
  <!-- ONLINE -->
  <rect x="118" y="88" width="70" height="18" fill="none" stroke="#00ff9d" stroke-width="1"/>
  <circle cx="130" cy="97" r="3" fill="#00ff9d"/>
  <text x="138" y="97" dominant-baseline="central" class="mono" font-size="9" fill="#00ff9d" letter-spacing="1.5">ONLINE</text>
  <!-- DISPONIBLE -->
  <rect x="196" y="88" width="86" height="18" fill="none" stroke="#C8001A" stroke-width="1"/>
  <text x="239" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#C8001A" letter-spacing="1.5">DISPONIBLE</text>
  <!-- LARA VE -->
  <rect x="290" y="88" width="72" height="18" fill="none" stroke="#3a5060" stroke-width="1"/>
  <text x="326" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#6a8090" letter-spacing="1.5">LARA · VE</text>
  <!-- GRACOSOFT -->
  <rect x="370" y="88" width="82" height="18" fill="none" stroke="#3a5060" stroke-width="1"/>
  <text x="411" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#6a8090" letter-spacing="1.5">GRACOSOFT</text>

  <!-- Vitals label -->
  <text x="118" y="126" class="mono" font-size="9" fill="#3a5060" letter-spacing="3">VITALS</text>

  <!-- HP bar -->
  <text x="118" y="142" class="mono" font-size="9" fill="#3a5060">HP</text>
  <rect x="138" y="135" width="260" height="5" fill="#0d1014" stroke="#1a2028" stroke-width="0.5"/>
  <rect x="138" y="135" width="239" height="5" fill="#00ff9d"/>
  <text x="406" y="142" class="mono" font-size="9" fill="#3a5060">92</text>

  <!-- XP bar -->
  <text x="118" y="158" class="mono" font-size="9" fill="#3a5060">XP</text>
  <rect x="138" y="151" width="260" height="5" fill="#0d1014" stroke="#1a2028" stroke-width="0.5"/>
  <rect x="138" y="151" width="202" height="5" fill="#00ff9d"/>
  <text x="406" y="158" class="mono" font-size="9" fill="#3a5060">Lv4</text>

  <!-- PWR bar -->
  <text x="118" y="174" class="mono" font-size="9" fill="#3a5060">PWR</text>
  <rect x="138" y="167" width="260" height="5" fill="#0d1014" stroke="#1a2028" stroke-width="0.5"/>
  <rect x="138" y="167" width="221" height="5" fill="#C8001A"/>
  <text x="406" y="174" class="mono" font-size="9" fill="#3a5060">85</text>

  <!-- Right side decorative vertical line -->
  <line x1="680" y1="20" x2="680" y2="180" stroke="#1a2028" stroke-width="1"/>
  <text x="700" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#3a5060" letter-spacing="2" transform="rotate(90,700,97)">SISTEMA ACTIVO</text>
</svg>
