<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    /* Fuentes del sistema — sin @import externo */
    .mono { font-family: 'Courier New', Courier, monospace; }
    .orb  { font-family: 'Courier New', Courier, monospace; font-weight: 900; }

    /* Hazard strip scroll */
    @keyframes hazscroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-20px); }
    }
    /* Bar fills */
    @keyframes fillHP  { from { width: 0; } to { width: 228px; } }
    @keyframes fillXP  { from { width: 0; } to { width: 192px; } }
    @keyframes fillPWR { from { width: 0; } to { width: 210px; } }
    /* Pulse */
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }
    /* Glitch */
    @keyframes glitch {
      0%,90%,100% { transform: translate(0,0); fill: #e8f0f4; }
      91%          { transform: translate(-4px,0); fill: #ff4444; }
      93%          { transform: translate(4px,0);  fill: #00ff9d; }
      95%          { transform: translate(0,0);    fill: #e8f0f4; }
    }
    /* Corner blink */
    @keyframes cblink {
      0%,48%,100% { opacity: 1; }
      50%,98%     { opacity: 0.1; }
    }
    /* Cursor */
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }
    /* Fade up */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* Scan line */
    @keyframes scan {
      from { transform: translateY(-220px); }
      to   { transform: translateY(220px); }
    }
    /* Badge glow pulse */
    @keyframes bglow {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.6; }
    }

    .haz       { animation: hazscroll 0.5s linear infinite; }
    .bar-hp    { animation: fillHP  1.3s cubic-bezier(.4,0,.2,1) 0.5s both; }
    .bar-xp    { animation: fillXP  1.3s cubic-bezier(.4,0,.2,1) 0.7s both; }
    .bar-pwr   { animation: fillPWR 1.3s cubic-bezier(.4,0,.2,1) 0.9s both; }
    .dot       { animation: pulse 1.8s ease-in-out infinite; }
    .glitch    { animation: glitch 7s ease-in-out infinite; }
    .cblink    { animation: cblink 2.8s step-end infinite; }
    .cursor    { animation: blink 1s step-end infinite; }
    .scan-line { animation: scan 3s linear infinite; }
    .f0 { animation: fadeUp 0.6s ease 0.1s both; }
    .f1 { animation: fadeUp 0.6s ease 0.3s both; }
    .f2 { animation: fadeUp 0.6s ease 0.5s both; }
    .f3 { animation: fadeUp 0.6s ease 0.7s both; }
    .f4 { animation: fadeUp 0.6s ease 0.9s both; }
    .bglow { animation: bglow 2s ease-in-out infinite; }
  </style>

  <pattern id="hz" x="0" y="0" width="20" height="4" patternUnits="userSpaceOnUse">
    <rect x="0"  y="0" width="12" height="4" fill="#C8001A"/>
    <rect x="12" y="0" width="8"  height="4" fill="#06080a"/>
  </pattern>

  <linearGradient id="scanG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="white" stop-opacity="0"/>
    <stop offset="45%"  stop-color="white" stop-opacity="0.05"/>
    <stop offset="55%"  stop-color="white" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>

  <linearGradient id="barHp" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#00ff9d"/>
    <stop offset="100%" stop-color="#00cc7a"/>
  </linearGradient>
  <linearGradient id="barPwr" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#C8001A"/>
    <stop offset="100%" stop-color="#ff2244"/>
  </linearGradient>
  <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%"   stop-color="#06080a"/>
    <stop offset="100%" stop-color="#0a0e12"/>
  </linearGradient>
</defs>

<!-- ── BACKGROUND ── -->
<rect width="800" height="220" fill="url(#bgGrad)"/>

<!-- Grid lines -->
<line x1="0" y1="58"  x2="800" y2="58"  stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="115" x2="800" y2="115" stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="175" x2="800" y2="175" stroke="#0d1014" stroke-width="1"/>
<line x1="645" y1="0" x2="645" y2="220" stroke="#0d1014" stroke-width="1" stroke-dasharray="3 5"/>

<!-- Hazard TOP -->
<g class="haz">
  <rect x="-20" y="0" width="840" height="4" fill="url(#hz)"/>
</g>
<!-- Hazard BOTTOM -->
<g class="haz">
  <rect x="-20" y="216" width="840" height="4" fill="url(#hz)"/>
</g>

<!-- Scan line overlay -->
<rect class="scan-line" x="0" y="0" width="800" height="30" fill="url(#scanG)"/>

<!-- ── MONOGRAM BOX ── -->
<g class="f0">
  <rect x="28" y="26" width="70" height="70" fill="#0d1014" stroke="#C8001A" stroke-width="1.5"/>
  <rect x="33" y="31" width="60" height="60" fill="none" stroke="#C8001A" stroke-width="0.4" opacity="0.3"/>
  <!-- Corners TL -->
  <polyline class="cblink" points="28,26 16,26 16,14 28,14" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <!-- Corners TR -->
  <polyline           points="98,26 110,26 110,14 98,14"  fill="none" stroke="#00ff9d" stroke-width="2"/>
  <!-- Corners BL -->
  <polyline           points="28,96 16,96 16,108 28,108"  fill="none" stroke="#00ff9d" stroke-width="2"/>
  <!-- Corners BR -->
  <polyline class="cblink" points="98,96 110,96 110,108 98,108" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <text x="63" y="61" text-anchor="middle" dominant-baseline="central" class="orb" font-size="22" letter-spacing="2" fill="#C8001A">DM</text>
</g>

<!-- ── NAME ── -->
<g class="f1">
  <text class="glitch" x="124" y="57" class="orb" font-size="30" letter-spacing="4" fill="#e8f0f4">DAVID MENDOZA</text>
  <text class="cursor" x="568" y="55" class="mono" font-size="28" fill="#C8001A">_</text>
</g>

<!-- ── ROLE ── -->
<g class="f2">
  <text x="126" y="80" class="mono" font-size="11" fill="#C8001A" letter-spacing="5">// FULL STACK DEVELOPER</text>
</g>

<!-- ── BADGES ── -->
<g class="f3">
  <!-- ONLINE -->
  <rect x="124" y="92" width="78" height="20" fill="#001a0d" stroke="#00ff9d" stroke-width="1"/>
  <circle class="dot" cx="137" cy="102" r="4" fill="#00ff9d"/>
  <text x="148" y="102" dominant-baseline="central" class="mono" font-size="9" fill="#00ff9d" letter-spacing="2">ONLINE</text>

  <!-- DISPONIBLE -->
  <rect x="210" y="92" width="94" height="20" fill="#1a0005" stroke="#C8001A" stroke-width="1"/>
  <text x="257" y="102" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#C8001A" letter-spacing="2">DISPONIBLE</text>

  <!-- LARA VE -->
  <rect x="312" y="92" width="78" height="20" fill="#0d1014" stroke="#1a2028" stroke-width="1"/>
  <text x="351" y="102" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#4a6070" letter-spacing="2">LARA · VE</text>

  <!-- GRACOSOFT -->
  <rect x="398" y="92" width="90" height="20" fill="#0d1014" stroke="#1a2028" stroke-width="1"/>
  <text x="443" y="102" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#4a6070" letter-spacing="2">GRACOSOFT</text>
</g>

<!-- ── VITALS ── -->
<g class="f4">
  <text x="124" y="128" class="mono" font-size="8" fill="#2a3840" letter-spacing="3">VITALS ──────────────────────────</text>

  <!-- HP -->
  <text x="124" y="148" class="mono" font-size="9" fill="#3a5060">HP</text>
  <rect x="148" y="142" width="260" height="7" fill="#0a0e12" stroke="#1a2028" stroke-width="0.5" rx="1"/>
  <rect class="bar-hp"  x="148" y="142" width="0" height="7" fill="url(#barHp)" rx="1"/>
  <text x="416" y="148" class="mono" font-size="9" fill="#00ff9d">92%</text>

  <!-- XP -->
  <text x="124" y="167" class="mono" font-size="9" fill="#3a5060">XP</text>
  <rect x="148" y="161" width="260" height="7" fill="#0a0e12" stroke="#1a2028" stroke-width="0.5" rx="1"/>
  <rect class="bar-xp"  x="148" y="161" width="0" height="7" fill="url(#barHp)" rx="1"/>
  <text x="416" y="167" class="mono" font-size="9" fill="#00ff9d">Lv4</text>

  <!-- PWR -->
  <text x="124" y="186" class="mono" font-size="9" fill="#3a5060">PWR</text>
  <rect x="148" y="180" width="260" height="7" fill="#0a0e12" stroke="#1a2028" stroke-width="0.5" rx="1"/>
  <rect class="bar-pwr" x="148" y="180" width="0" height="7" fill="url(#barPwr)" rx="1"/>
  <text x="416" y="186" class="mono" font-size="9" fill="#C8001A">85%</text>
</g>

<!-- ── RIGHT STATUS PANEL ── -->
<g class="f2">
  <rect x="660" y="26" width="112" height="70" fill="#0d1014" stroke="#1a2028" stroke-width="1"/>
  <text x="716" y="44" text-anchor="middle" class="mono" font-size="7" fill="#2a3840" letter-spacing="3">STATUS</text>
  <!-- Outer ring -->
  <circle cx="716" cy="66" r="16" fill="none" stroke="#1a2028" stroke-width="1"/>
  <!-- Inner ring pulsing -->
  <circle class="dot" cx="716" cy="66" r="12" fill="none" stroke="#00ff9d" stroke-width="1.5"/>
  <!-- Center dot -->
  <circle cx="716" cy="66" r="5" fill="#00ff9d"/>
  <circle class="dot" cx="716" cy="66" r="3" fill="#06080a"/>
  <text x="716" y="85" text-anchor="middle" class="mono" font-size="7" fill="#3a5060" letter-spacing="2">ACTIVO</text>
</g>
<!-- Decorative right column dots -->
<g class="f3">
  <circle cx="648" cy="60"  r="1.5" fill="#1a2028"/>
  <circle cx="648" cy="80"  r="1.5" fill="#1a2028"/>
  <circle cx="648" cy="100" r="1.5" fill="#1a2028"/>
  <circle cx="648" cy="120" r="1.5" fill="#1a2028"/>
  <circle cx="648" cy="140" r="1.5" fill="#C8001A"/>
  <circle cx="648" cy="160" r="1.5" fill="#1a2028"/>
  <circle cx="648" cy="180" r="1.5" fill="#1a2028"/>
</g>
</svg>
