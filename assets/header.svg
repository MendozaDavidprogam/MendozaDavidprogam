<svg width="800" height="220" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    .orb  { font-family: 'Orbitron', 'Share Tech Mono', monospace; }

    /* ── SCANLINE overlay ── */
    @keyframes scan {
      0%   { transform: translateY(-100%); }
      100% { transform: translateY(800%); }
    }

    /* ── Pulse online dot ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; r: 4; }
      50%       { opacity: 0.2; r: 3; }
    }

    /* ── Bar fill animations ── */
    @keyframes fillHP {
      0%   { width: 0px; }
      100% { width: 220px; }
    }
    @keyframes fillXP {
      0%   { width: 0px; }
      100% { width: 186px; }
    }
    @keyframes fillPWR {
      0%   { width: 0px; }
      100% { width: 204px; }
    }

    /* ── Name glitch ── */
    @keyframes glitch1 {
      0%,94%,100% { transform: translate(0,0); opacity: 1; }
      95%          { transform: translate(-3px, 1px); opacity: 0.8; }
      97%          { transform: translate(3px,-1px); opacity: 0.9; }
    }
    @keyframes glitch2 {
      0%,94%,100% { transform: translate(0,0); opacity: 0; }
      95%          { transform: translate(4px, 0); opacity: 0.5; }
      97%          { transform: translate(-4px,0); opacity: 0.4; }
    }

    /* ── Corner blink ── */
    @keyframes cornerblink {
      0%,49%,100% { opacity: 1; }
      50%,99%     { opacity: 0.3; }
    }

    /* ── Hazard strip scroll ── */
    @keyframes hazscroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-20px); }
    }

    /* ── Fade in sections ── */
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ── Type cursor blink ── */
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%     { opacity: 0; }
    }

    .name-main { animation: glitch1 6s ease-in-out infinite; }
    .name-ghost { animation: glitch2 6s ease-in-out infinite; }
    .dot-pulse  { animation: pulse 1.8s ease-in-out infinite; }
    .corner-blink { animation: cornerblink 3s step-end infinite; }
    .bar-hp  { animation: fillHP  1.4s cubic-bezier(.4,0,.2,1) 0.4s both; }
    .bar-xp  { animation: fillXP  1.4s cubic-bezier(.4,0,.2,1) 0.6s both; }
    .bar-pwr { animation: fillPWR 1.4s cubic-bezier(.4,0,.2,1) 0.8s both; }
    .fadein-0 { animation: fadeUp 0.7s ease 0.1s both; }
    .fadein-1 { animation: fadeUp 0.7s ease 0.3s both; }
    .fadein-2 { animation: fadeUp 0.7s ease 0.5s both; }
    .fadein-3 { animation: fadeUp 0.7s ease 0.7s both; }
    .fadein-4 { animation: fadeUp 0.7s ease 0.9s both; }
    .cursor   { animation: blink 1s step-end infinite; }
    .scan-line { animation: scan 4s linear infinite; }
    .haz      { animation: hazscroll 0.6s linear infinite; }
  </style>

  <!-- Hazard pattern -->
  <pattern id="hz" x="0" y="0" width="20" height="4" patternUnits="userSpaceOnUse">
    <rect x="0"  y="0" width="12" height="4" fill="#C8001A"/>
    <rect x="12" y="0" width="8"  height="4" fill="#06080a"/>
  </pattern>

  <!-- Scanline mask -->
  <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="white" stop-opacity="0"/>
    <stop offset="50%"  stop-color="white" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </linearGradient>
  <mask id="scanMask">
    <rect width="800" height="40" fill="url(#scanGrad)"/>
  </mask>
</defs>

<!-- ── BG ── -->
<rect width="800" height="220" fill="#06080a"/>

<!-- Subtle grid lines -->
<line x1="0" y1="60"  x2="800" y2="60"  stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="120" x2="800" y2="120" stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="180" x2="800" y2="180" stroke="#0d1014" stroke-width="1"/>
<line x1="640" y1="0" x2="640" y2="220" stroke="#0d1014" stroke-width="1"/>

<!-- Hazard top strip (animated scroll) -->
<g class="haz">
  <rect x="-20" y="0" width="840" height="4" fill="url(#hz)"/>
</g>
<!-- Hazard bottom strip -->
<g class="haz">
  <rect x="-20" y="216" width="840" height="4" fill="url(#hz)"/>
</g>

<!-- ── MONOGRAM BOX ── -->
<g class="fadein-0">
  <rect x="28" y="24" width="68" height="68" fill="#0d1014" stroke="#C8001A" stroke-width="1.5"/>
  <!-- Animated corner TL -->
  <polyline class="corner-blink" points="28,24 18,24 18,14 28,14" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <!-- Corner TR -->
  <polyline points="96,24 106,24 106,14 96,14" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <!-- Corner BL -->
  <polyline points="28,92 18,92 18,102 28,102" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <!-- Corner BR animated -->
  <polyline class="corner-blink" points="96,92 106,92 106,102 96,102" fill="none" stroke="#00ff9d" stroke-width="2"/>
  <text x="62" y="60" text-anchor="middle" dominant-baseline="central" class="orb" font-size="20" font-weight="900" fill="#C8001A">DM</text>
  <!-- Inner border -->
  <rect x="33" y="29" width="58" height="58" fill="none" stroke="#C8001A" stroke-width="0.5" opacity="0.3"/>
</g>

<!-- ── NAME ── -->
<g class="fadein-1">
  <!-- Ghost layer for glitch -->
  <text class="name-ghost" x="122" y="54" class="orb" font-size="28" font-weight="900" fill="#C8001A" opacity="0" letter-spacing="2">DAVID MENDOZA</text>
  <text class="name-main"  x="122" y="54" class="orb" font-size="28" font-weight="900" fill="#e8f0f4" letter-spacing="2">DAVID MENDOZA</text>
  <text class="cursor" x="560" y="54" class="mono" font-size="26" fill="#C8001A">_</text>
</g>

<!-- ── ROLE ── -->
<g class="fadein-2">
  <text x="124" y="76" class="mono" font-size="11" fill="#C8001A" letter-spacing="4">// FULL STACK DEVELOPER</text>
</g>

<!-- ── BADGES ── -->
<g class="fadein-3">
  <!-- ONLINE -->
  <rect x="122" y="88" width="74" height="18" fill="#001a0d" stroke="#00ff9d" stroke-width="1"/>
  <circle class="dot-pulse" cx="135" cy="97" r="4" fill="#00ff9d"/>
  <text x="145" y="97" dominant-baseline="central" class="mono" font-size="9" fill="#00ff9d" letter-spacing="2">ONLINE</text>

  <!-- DISPONIBLE -->
  <rect x="204" y="88" width="90" height="18" fill="#1a0005" stroke="#C8001A" stroke-width="1"/>
  <text x="249" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#C8001A" letter-spacing="2">DISPONIBLE</text>

  <!-- LARA VE -->
  <rect x="302" y="88" width="76" height="18" fill="#0d1014" stroke="#1a2028" stroke-width="1"/>
  <text x="340" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#6a8090" letter-spacing="2">LARA · VE</text>

  <!-- GRACOSOFT -->
  <rect x="386" y="88" width="86" height="18" fill="#0d1014" stroke="#1a2028" stroke-width="1"/>
  <text x="429" y="97" text-anchor="middle" dominant-baseline="central" class="mono" font-size="9" fill="#6a8090" letter-spacing="2">GRACOSOFT</text>
</g>

<!-- ── VITALS ── -->
<g class="fadein-4">
  <text x="122" y="124" class="mono" font-size="8" fill="#3a5060" letter-spacing="3">VITALS ─────────────────────────────</text>

  <!-- HP -->
  <text x="122" y="142" class="mono" font-size="9" fill="#3a5060">HP</text>
  <rect x="144" y="136" width="260" height="7" fill="#0d1014" stroke="#1a2028" stroke-width="0.5" rx="1"/>
  <rect class="bar-hp"  x="144" y="136" width="0"   height="7" fill="#00ff9d" rx="1"/>
  <text x="411" y="142" class="mono" font-size="9" fill="#00ff9d">92%</text>

  <!-- XP -->
  <text x="122" y="160" class="mono" font-size="9" fill="#3a5060">XP</text>
  <rect x="144" y="154" width="260" height="7" fill="#0d1014" stroke="#1a2028" stroke-width="0.5" rx="1"/>
  <rect class="bar-xp"  x="144" y="154" width="0"   height="7" fill="#00ff9d" rx="1"/>
  <text x="411" y="160" class="mono" font-size="9" fill="#00ff9d">Lv4</text>

  <!-- PWR -->
  <text x="122" y="178" class="mono" font-size="9" fill="#3a5060">PWR</text>
  <rect x="144" y="172" width="260" height="7" fill="#0d1014" stroke="#1a2028" stroke-width="0.5" rx="1"/>
  <rect class="bar-pwr" x="144" y="172" width="0"   height="7" fill="#C8001A" rx="1"/>
  <text x="411" y="178" class="mono" font-size="9" fill="#C8001A">85%</text>
</g>

<!-- ── RIGHT PANEL ── -->
<g class="fadein-2">
  <rect x="660" y="24" width="112" height="68" fill="#0d1014" stroke="#1a2028" stroke-width="1"/>
  <text x="716" y="40" text-anchor="middle" class="mono" font-size="8" fill="#3a5060" letter-spacing="2">SISTEMA</text>
  <circle class="dot-pulse" cx="716" cy="58" r="6" fill="none" stroke="#00ff9d" stroke-width="1.5"/>
  <circle cx="716" cy="58" r="3" fill="#00ff9d"/>
  <text x="716" y="80" text-anchor="middle" class="mono" font-size="7" fill="#3a5060" letter-spacing="1">ACTIVO</text>
</g>

<!-- ── SCAN LINE overlay ── -->
<rect class="scan-line" x="0" y="-40" width="800" height="40" fill="url(#scanGrad)" opacity="0.6"/>

<!-- Right decorative vertical line -->
<line x1="648" y1="10" x2="648" y2="210" stroke="#1a2028" stroke-width="0.5" stroke-dasharray="4 4"/>
</svg>
