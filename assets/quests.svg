<svg fill="none" width="800" height="310" viewBox="0 0 800 310" xmlns="http://www.w3.org/2000/svg">
<foreignObject width="800" height="310">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
*{box-sizing:border-box;margin:0;padding:0}
.w{width:800px;height:310px;background:#06080a;font-family:'Courier New',Courier,monospace;color:#b8ccd4;position:relative;overflow:hidden}

@keyframes hz{from{background-position:0 0}to{background-position:-20px 0}}
.hstrip{height:3px;background:repeating-linear-gradient(90deg,#C8001A 0,#C8001A 12px,#06080a 12px,#06080a 20px);background-size:20px 3px;animation:hz .5s linear infinite}
.bstrip{position:absolute;bottom:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#C8001A 0,#C8001A 12px,#06080a 12px,#06080a 20px);background-size:20px 3px;animation:hz .5s linear infinite}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes amber{0%,100%{color:#FFB800}50%{color:#ff6600}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes bar75{from{width:0}to{width:75%}}
@keyframes bar55{from{width:0}to{width:55%}}

.body{padding:12px 28px}
.sec-hdr{font-size:9px;letter-spacing:3px;color:#C8001A;margin-bottom:4px}
.sec-hdr span{color:#2a3840}
.divline{border:none;border-top:1px solid #1a2028;margin-bottom:12px}

.quest{display:flex;align-items:flex-start;gap:12px;padding:9px 14px;border:1px solid #1a2028;border-left:3px solid transparent;margin-bottom:6px;animation:fadeUp .5s ease both}
.quest.done{border-left-color:#00ff9d;background:rgba(0,255,157,.015)}
.quest.prog{border-left-color:#FFB800;background:rgba(255,184,0,.015)}
.quest.lock{border-left-color:#1a2028;opacity:.35}
.q-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.done .q-icon{color:#00ff9d}
.prog .q-icon{animation:amber 1.4s ease-in-out infinite}
.lock .q-icon{color:#2a3840}
.q-body{flex:1}
.q-name{font-size:12px;color:#e8f0f4;margin-bottom:3px}
.q-desc{font-size:9px;color:#2a3840}
.q-bar-row{display:flex;align-items:center;gap:8px;margin:5px 0 3px}
.q-track{flex:1;height:6px;background:#0a0c0e;border:1px solid #1a2028;border-radius:1px;overflow:hidden;max-width:220px}
.q-fill{height:100%;background:linear-gradient(90deg,#cc8800,#FFB800);border-radius:1px}
.fill-75{animation:bar75 1.2s cubic-bezier(.4,0,.2,1) .5s both}
.fill-55{animation:bar55 1.2s cubic-bezier(.4,0,.2,1) .65s both}
.q-pct{font-size:9px;color:#FFB800}
.q-done-badge{float:right;font-size:8px;padding:2px 6px;border:1px solid #00ff9d;color:#00ff9d;background:rgba(0,255,157,.06)}

.pulse-dot{width:6px;height:6px;border-radius:50%;background:#00ff9d;display:inline-block;margin-right:8px;animation:pulse 1.8s ease-in-out infinite;vertical-align:middle}
.cursor{animation:blink 1s step-end infinite;color:#C8001A}

/* Quest delays */
.qd1{animation-delay:.10s}.qd2{animation-delay:.22s}.qd3{animation-delay:.34s}
.qd4{animation-delay:.46s}.qd5{animation-delay:.58s}

/* CONTACT */
.contact{display:flex;gap:8px;align-items:center}
.cbtn{font-size:9px;letter-spacing:2px;padding:6px 14px;border:1px solid;font-family:'Courier New',monospace;cursor:pointer;display:flex;align-items:center;gap:6px}
.cbtn.r{border-color:#C8001A;color:#C8001A;background:rgba(200,0,26,.04)}
.cbtn.g{border-color:#00ff9d;color:#00ff9d;background:rgba(0,255,157,.03)}
.cdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.status-right{margin-left:auto;font-size:8px;color:#2a3840;letter-spacing:2px;display:flex;align-items:center}
</style>

<div class="w">
<div class="hstrip"></div>
<div class="body">
  <div class="sec-hdr">// REGISTRO <span>DE MISIONES</span></div>
  <hr class="divline"/>

  <div class="quest done qd1">
    <span class="q-icon">&#x2714;</span>
    <div class="q-body">
      <div class="q-name">Dominar el Stack Full Stack <span class="q-done-badge">100%</span></div>
      <div class="q-desc">Java · Node.js · React · PostgreSQL — COMPLETADO</div>
    </div>
  </div>

  <div class="quest done qd2">
    <span class="q-icon">&#x2714;</span>
    <div class="q-body">
      <div class="q-name">Construir APIs REST escalables <span class="q-done-badge">100%</span></div>
      <div class="q-desc">NestJS + TypeScript + PostgreSQL — COMPLETADO</div>
    </div>
  </div>

  <div class="quest prog qd3">
    <span class="q-icon">&#x25BA;</span>
    <div class="q-body">
      <div class="q-name">Desarrollo Mobile — React Native</div>
      <div class="q-bar-row">
        <div class="q-track"><div class="q-fill fill-75"></div></div>
        <span class="q-pct">75%</span>
        <span style="font-size:9px;color:#2a3840">EN PROGRESO</span>
      </div>
    </div>
  </div>

  <div class="quest prog qd4">
    <span class="q-icon">&#x25BA;</span>
    <div class="q-body">
      <div class="q-name">Python para Backend / ML</div>
      <div class="q-bar-row">
        <div class="q-track"><div class="q-fill fill-55"></div></div>
        <span class="q-pct">55%</span>
        <span style="font-size:9px;color:#2a3840">FastAPI · NumPy</span>
      </div>
    </div>
  </div>

  <div class="quest lock qd5">
    <span class="q-icon">&#x25A3;</span>
    <div class="q-body">
      <div class="q-name">Deploy en la Nube — AWS / GCP</div>
      <div class="q-desc">BLOQUEADO — Requiere nivel 5</div>
    </div>
  </div>

  <div style="border-top:1px solid #1a2028;margin:10px 0 10px"></div>
  <div style="font-size:9px;letter-spacing:2px;color:#C8001A;margin-bottom:8px">// INICIAR COMUNICACION</div>
  <div class="contact">
    <div class="cbtn r"><span class="cdot"></span>GITHUB</div>
    <div class="cbtn g"><span class="cdot"></span>EMAIL</div>
    <div class="status-right">
      <span class="pulse-dot"></span>
      SISTEMA ACTIVO<span class="cursor">_</span>
    </div>
  </div>
</div>
<div class="bstrip"></div>
</div>
</div>
</foreignObject>
</svg>
