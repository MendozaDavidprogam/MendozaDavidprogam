<svg width="800" height="570" viewBox="0 0 800 570" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .mono { font-family: 'Courier New', Courier, monospace; }

    @keyframes hazscroll { from { transform: translateX(0); } to { transform: translateX(-20px); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bar { from { width: 0; } }

    .haz { animation: hazscroll 0.5s linear infinite; }

    /* Row fade-ins */
    .r0  { animation: fadeUp .5s ease .10s both; }
    .r1  { animation: fadeUp .5s ease .20s both; }
    .r2  { animation: fadeUp .5s ease .30s both; }
    .r3  { animation: fadeUp .5s ease .40s both; }
    .r4  { animation: fadeUp .5s ease .50s both; }
    .r5  { animation: fadeUp .5s ease .60s both; }
    .r6  { animation: fadeUp .5s ease .70s both; }
    .r7  { animation: fadeUp .5s ease .80s both; }
    .r8  { animation: fadeUp .5s ease .90s both; }
    .r9  { animation: fadeUp .5s ease 1.00s both; }
    .r10 { animation: fadeUp .5s ease 1.10s both; }
    .r11 { animation: fadeUp .5s ease 1.20s both; }
    .r12 { animation: fadeUp .5s ease 1.30s both; }
    .r13 { animation: fadeUp .5s ease 1.40s both; }

    /* Bar animations — each named */
    .bj  { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .25s both; width: 180px; }
    .bno { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .35s both; width: 176px; }
    .bne { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .45s both; width: 160px; }
    .bpy { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .55s both; width: 140px; }
    .bph { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .65s both; width: 120px; }
    .bre { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .75s both; width: 174px; }
    .bts { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .85s both; width: 164px; }
    .bjs { animation: bar 1.2s cubic-bezier(.4,0,.2,1) .95s both; width: 170px; }
    .bht { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.05s both; width: 168px; }
    .brn { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.15s both; width: 150px; }
    .bpg { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.25s both; width: 172px; }
    .bgi { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.35s both; width: 184px; }
    .bmy { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.45s both; width: 156px; }
  </style>

  <pattern id="hz" x="0" y="0" width="20" height="3" patternUnits="userSpaceOnUse">
    <rect x="0"  y="0" width="12" height="3" fill="#C8001A"/>
    <rect x="12" y="0" width="8"  height="3" fill="#06080a"/>
  </pattern>
  <linearGradient id="gr" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#C8001A"/>
    <stop offset="100%" stop-color="#ff2244"/>
  </linearGradient>
  <linearGradient id="gb" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"   stop-color="#3366ff"/>
    <stop offset="100%" stop-color="#4488ff"/>
  </linearGradient>
</defs>

<rect width="800" height="570" fill="#06080a"/>
<line x1="0" y1="55"  x2="800" y2="55"  stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="262" x2="800" y2="262" stroke="#0d1014" stroke-width="1"/>
