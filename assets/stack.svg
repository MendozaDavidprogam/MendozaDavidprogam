<svg width="800" height="570" viewBox="0 0 800 570" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .mono { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    .orb  { font-family: 'Orbitron', 'Share Tech Mono', monospace; }

    /* ── Bar fill ── */
    @keyframes bar { 0% { width: 0px; } }
    @keyframes fadeUp {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes headerGlow {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }
    @keyframes rowHover {
      0%   { fill-opacity: 0; }
      100% { fill-opacity: 1; }
    }
    @keyframes hazscroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-20px); }
    }

    /* bars — red S tier */
    .b-java  { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 0.3s both; width: 180px; }
    .b-node  { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 0.45s both; width: 176px; }
    .b-nest  { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 0.6s both;  width: 160px; }
    .b-py    { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 0.75s both; width: 140px; }
    .b-php   { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 0.9s both;  width: 120px; }
    .b-react { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.0s both;  width: 174px; }
    .b-ts    { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.1s both;  width: 164px; }
    .b-js    { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.2s both;  width: 170px; }
    .b-html  { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.3s both;  width: 168px; }
    .b-css   { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.4s both;  width: 156px; }
    .b-rn    { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.5s both;  width: 150px; }
    .b-pg    { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.6s both;  width: 172px; }
    .b-git   { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.7s both;  width: 184px; }
    .b-my    { animation: bar 1.2s cubic-bezier(.4,0,.2,1) 1.8s both;  width: 156px; }

    /* row fade in */
    .r0  { animation: fadeUp 0.5s ease 0.2s  both; }
    .r1  { animation: fadeUp 0.5s ease 0.35s both; }
    .r2  { animation: fadeUp 0.5s ease 0.5s  both; }
    .r3  { animation: fadeUp 0.5s ease 0.65s both; }
    .r4  { animation: fadeUp 0.5s ease 0.8s  both; }
    .r5  { animation: fadeUp 0.5s ease 0.95s both; }
    .r6  { animation: fadeUp 0.5s ease 1.1s  both; }
    .r7  { animation: fadeUp 0.5s ease 1.25s both; }
    .r8  { animation: fadeUp 0.5s ease 1.4s  both; }
    .r9  { animation: fadeUp 0.5s ease 1.55s both; }
    .r10 { animation: fadeUp 0.5s ease 1.7s  both; }
    .r11 { animation: fadeUp 0.5s ease 1.85s both; }
    .r12 { animation: fadeUp 0.5s ease 2.0s  both; }
    .r13 { animation: fadeUp 0.5s ease 2.15s both; }

    .sec-title { animation: fadeUp 0.5s ease 0.1s both; }
    .haz { animation: hazscroll 0.6s linear infinite; }
  </style>

  <pattern id="hz" x="0" y="0" width="20" height="3" patternUnits="userSpaceOnUse">
    <rect x="0"  y="0" width="12" height="3" fill="#C8001A"/>
    <rect x="12" y="0" width="8"  height="3" fill="#06080a"/>
  </pattern>
</defs>

<!-- BG -->
<rect width="800" height="570" fill="#06080a"/>

<!-- subtle grid -->
<line x1="0" y1="55"  x2="800" y2="55"  stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="260" x2="800" y2="260" stroke="#0d1014" stroke-width="1"/>
<line x1="0" y1="430" x2="800" y2="430" stroke="#0d1014" stroke-width="1"/>

<!-- hazard strip top -->
<g class="haz"><rect x="-20" y="0" width="840" height="3" fill="url(#hz)"/></g>
<g class="haz"><rect x="-20" y="567" width="840" height="3" fill="url(#hz)"/></g>

<!-- Section title -->
<g class="sec-title">
  <text x="32" y="30" class="mono" font-size="10" fill="#C8001A" letter-spacing="2">// INVENTARIO</text>
  <text x="140" y="30" class="mono" font-size="10" fill="#3a5060" letter-spacing="2">— TECH STACK</text>
  <line x1="32" y1="38" x2="768" y2="38" stroke="#1a2028" stroke-width="1"/>
  <!-- Tier legend -->
  <text x="580" y="30" class="mono" font-size="8" fill="#00ff9d">S</text>
  <text x="592" y="30" class="mono" font-size="8" fill="#3a5060">= Maestría &nbsp;</text>
  <text x="660" y="30" class="mono" font-size="8" fill="#4488ff">A</text>
  <text x="672" y="30" class="mono" font-size="8" fill="#3a5060">= Avanzado</text>
</g>

<!-- ══ BACKEND ══ -->
